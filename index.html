<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Virex</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="hero">
  <div class="bg-anim"></div>

  <nav class="nav">
    <h2>Virex</h2>
    <div>
      <a href="#features">Функции</a>
      <a href="#about">О нас</a>
    </div>
  </nav>

  <div class="hero-content">
    <h1 class="reveal">Будущее общения</h1>
    <p class="reveal delay">Скорость. Безопасность. Стиль.</p>
    <button class="cta reveal delay2">Скачать</button>
  </div>
</header>

<section id="features" class="features">
  <h2 class="reveal">Почему Virex?</h2>

  <div class="grid">
    <div class="card reveal">🔒 Приватность</div>
    <div class="card reveal">⚡ Скорость</div>
    <div class="card reveal">🌍 Везде</div>
    <div class="card reveal">📞 Звонки</div>
  </div>
</section>

<section id="about" class="about">
  <h2 class="reveal">О продукте</h2>
  <p class="reveal delay">
    Virex — премиальный мессенджер нового поколения.
  </p>
</section>

<section class="cta-section">
  <h2 class="reveal">Попробуй сейчас</h2>
  <button class="big reveal delay">Скачать APK</button>
</section>

<footer>
  <p>© 2026 Virex</p>
</footer>

<script>
// SCROLL ANIMATION
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
});

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>

</body>
</html>
