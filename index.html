<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Virex</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./styles.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav class="nav">
  <h2>Virex</h2>
  <div>
    <a href="#features">Функции</a>
    <a href="#download">Скачать</a>
    <button onclick="toggleTheme()">🌙</button>
  </div>
</nav>

<header class="hero">
  <div class="hero-content">
    <h1 class="fade">Virex</h1>
    <p class="fade delay">Мессенджер нового поколения</p>
    <button class="cta fade delay2" onclick="download()">Скачать APK</button>
  </div>

  <div class="phone fade" id="phone">
    <div class="screen">
      <div class="msg">Привет 👋</div>
      <div class="msg me">Это Virex</div>
      <div class="msg">Добро пожаловать 🚀</div>
    </div>
  </div>
</header>

<section id="features" class="features">
  <h2 class="fade">Почему Virex?</h2>
  <div class="grid">
    <div class="card fade">🔒 Шифрование</div>
    <div class="card fade">⚡ Скорость</div>
    <div class="card fade">🌍 Везде</div>
    <div class="card fade">📞 Звонки</div>
  </div>
</section>

<section id="download" class="download">
  <h2>Скачать приложение</h2>
  <p>Версия для Android доступна сейчас</p>
  <button onclick="download()">Скачать APK</button>
</section>

<footer>
  <p>© 2026 Virex</p>
</footer>

<script>
// DOWNLOAD
function download() {
  window.location.href = "https://example.com/virex.apk";
}

// THEME SWITCH
function toggleTheme() {
  document.body.classList.toggle('light');
}

// SCROLL PHONE
window.addEventListener('scroll', () => {
  const phone = document.getElementById('phone');
  const scroll = window.scrollY;
  phone.style.transform = `translateY(${scroll * -0.2}px) rotate(${scroll * 0.05}deg)`;
});

// FADE
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting) e.target.classList.add('show');
  });
});

document.querySelectorAll('.fade').forEach(el => obs.observe(el));

// PARTICLES
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<60;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    dx: Math.random()-0.5,
    dy: Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
