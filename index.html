<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virex</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #050505;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  position: fixed;
  width: 100%;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

.logo {
  font-weight: 600;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 10%;
}

/* TEXT */
.hero-text {
  max-width: 500px;
}

h1 {
  font-size: 70px;
  background: linear-gradient(90deg, orange, purple);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* BUTTONS */
.btn {
  padding: 14px 28px;
  border-radius: 12px;
  text-decoration: none;
  margin-top: 20px;
  display: inline-block;
}

.primary {
  background: linear-gradient(90deg, orange, purple);
}

/* PHONE */
.phone {
  width: 260px;
  height: 520px;
  background: #111;
  border-radius: 40px;
  padding: 10px;
}

.screen {
  width: 100%;
  height: 100%;
  border-radius: 30px;
  background: #000;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* CHAT */
.msg {
  padding: 10px 14px;
  border-radius: 14px;
  max-width: 75%;
  opacity: 0;
  transform: translateY(10px);
  animation: show 0.5s forwards;
}

.left {
  background: #222;
  align-self: flex-start;
}

.right {
  background: linear-gradient(90deg, orange, purple);
  align-self: flex-end;
}

/* ANIMATION */
@keyframes show {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* SECTIONS */
section {
  padding: 120px 20px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <div class="logo">Virex</div>
</header>

<div class="hero">

  <div class="hero-text">
    <h1>Virex</h1>
    <p>Modern messenger with real-time communication</p>
    <a href="#" class="btn primary">Download APK</a>
  </div>

  <div class="phone">
    <div class="screen" id="chat"></div>
  </div>

</div>

<script>
const messages = [
  { text: "Hey, what is Virex?", side: "left" },
  { text: "It's a new messenger 🚀", side: "right" },
  { text: "Is it fast?", side: "left" },
  { text: "Super fast ⚡ and smooth", side: "right" },
  { text: "Looks really nice 👀", side: "left" },
  { text: "Yeah, modern UI and secure 🔒", side: "right" }
];

const chat = document.getElementById("chat");

let i = 0;

function showMessage() {
  if (i >= messages.length) return;

  const msg = document.createElement("div");
  msg.className = "msg " + messages[i].side;
  msg.innerText = messages[i].text;

  chat.appendChild(msg);

  i++;
  setTimeout(showMessage, 800);
}

showMessage();
</script>

</body>
</html>
