<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virex</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #050505;
  color: white;
}

/* GLOW */
.glow {
  position: fixed;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, orange, transparent 70%);
  filter: blur(150px);
  opacity: 0.3;
  top: 20%;
  left: 20%;
  z-index: -1;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  position: fixed;
  width: 100%;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.4);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 70px;
  height: 70px;
  object-fit: contain;
  filter: drop-shadow(0 0 10px rgba(255, 100, 0, 0.5));
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 10%;
}

/* TEXT */
h1 {
  font-size: 70px;
  background: linear-gradient(90deg, orange, purple);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* BUTTONS */
.btn {
  padding: 15px 30px;
  border-radius: 14px;
  text-decoration: none;
  margin-top: 20px;
  display: inline-block;
}

.primary {
  background: linear-gradient(90deg, orange, purple);
}

/* PHONE */
.phone {
  width: 260px;
  height: 520px;
  background: #111;
  border-radius: 40px;
  padding: 10px;
  box-shadow: 0 0 50px rgba(0,0,0,0.7);
  animation: powerOn 1.5s ease;
}

@keyframes powerOn {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.screen {
  width: 100%;
  height: 100%;
  border-radius: 30px;
  background: #000;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow: hidden;
}

/* CHAT */
.msg {
  padding: 10px 14px;
  border-radius: 14px;
  max-width: 70%;
  animation: fadeIn 1s ease;
}

.me {
  background: linear-gradient(90deg, orange, purple);
  align-self: flex-end;
}

.other {
  background: #222;
  align-self: flex-start;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* SECTION */
section {
  padding: 120px 20px;
  text-align: center;
}
</style>
</head>

<body>

<div class="glow"></div>

<header>
  <div class="logo">
    <img src="logo.png">
    <strong>Virex</strong>
  </div>
</header>

<div class="hero">
  <div>
    <h1>Virex</h1>
    <p>Experience the future of messaging</p>
    <a href="#" class="btn primary">Download APK</a>
  </div>

  <div class="phone">
    <div class="screen" id="chat"></div>
  </div>
</div>

<section>
  <h2>Fast. Secure. Beautiful.</h2>
</section>

<script>
const messages = [
  { text: "Hey 👋", type: "other" },
  { text: "Welcome to Virex", type: "other" },
  { text: "Looks amazing 😍", type: "me" },
  { text: "Super fast chat ⚡", type: "me" }
];

const chat = document.getElementById("chat");

let i = 0;

function showMessage() {
  if (i >= messages.length) return;

  const msg = document.createElement("div");
  msg.className = "msg " + messages[i].type;
  msg.innerText = messages[i].text;

  chat.appendChild(msg);

  i++;
  setTimeout(showMessage, 800);
}

showMessage();
</script>

</body>
</html>
