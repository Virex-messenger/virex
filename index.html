<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Virex</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050507;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  text-align: center;
  background: linear-gradient(135deg, #ff7a18, #7b2ff7);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  font-size: 60px;
}

button {
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  background: black;
  color: white;
}

/* PHONE */
.phone {
  width: 200px;
  height: 400px;
  margin: 30px auto;
  background: #111;
  border-radius: 20px;
  padding: 10px;
}

.screen {
  background: #0b141a;
  height: 100%;
  border-radius: 10px;
  padding: 10px;
}

.msg {
  background: #202c33;
  padding: 8px;
  border-radius: 10px;
  margin: 5px;
}

.me {
  background: #005c4b;
}

/* FEATURES */
.features {
  padding: 60px;
  text-align: center;
}

.card {
  background: #111;
  padding: 20px;
  margin: 10px;
  border-radius: 10px;
}
</style>

</head>
<body>

<div class="hero">
  <h1>Virex</h1>
  <p>Мессенджер будущего</p>
  <button>Скачать</button>

  <div class="phone">
    <div class="screen">
      <div class="msg">Привет</div>
      <div class="msg me">Это Virex</div>
    </div>
  </div>
</div>

<div class="features">
  <div class="card">🔒 Безопасность</div>
  <div class="card">⚡ Скорость</div>
</div>

</body>
</html>
