<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virex</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #050505;
  color: white;
  overflow-x: hidden;
}

/* GLOW BACKGROUND */
.glow {
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, orange, transparent 70%);
  filter: blur(120px);
  opacity: 0.4;
  top: 20%;
  left: 30%;
  z-index: -1;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  position: fixed;
  width: 100%;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.4);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 36px;
}

/* NAV */
nav a {
  margin-left: 25px;
  color: #aaa;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* PARALLAX */
.hero-content {
  text-align: center;
  transform-style: preserve-3d;
  transition: transform 0.1s;
}

h1 {
  font-size: 90px;
  background: linear-gradient(90deg, orange, purple);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  color: #aaa;
  margin-top: 10px;
}

/* BUTTONS */
.buttons {
  margin-top: 30px;
}

.btn {
  padding: 15px 30px;
  margin: 10px;
  border-radius: 14px;
  text-decoration: none;
  transition: 0.3s;
  position: relative;
}

.primary {
  background: linear-gradient(90deg, orange, purple);
  box-shadow: 0 0 20px rgba(255,140,0,0.6);
}

.secondary {
  border: 1px solid rgba(255,255,255,0.2);
}

.btn:hover {
  transform: scale(1.1);
}

/* SECTIONS */
section {
  padding: 120px 20px;
  text-align: center;
  opacity: 0;
  transform: translateY(50px);
  transition: 1s;
}

section.visible {
  opacity: 1;
  transform: translateY(0);
}

/* CARDS */
.features {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 16px;
  width: 250px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.08);
}

/* SMOOTH */
html {
  scroll-behavior: smooth;
}
</style>
</head>

<body>

<div class="glow"></div>

<header>
  <div class="logo">
    <img src="logo.png">
    <strong>Virex</strong>
  </div>

  <nav>
    <a href="#download">Download</a>
    <a href="#about">About</a>
  </nav>
</header>

<div class="hero">
  <div class="hero-content" id="hero">
    <h1>Virex</h1>
    <p>Next generation messaging platform</p>

    <div class="buttons">
      <a href="#" class="btn primary">Download APK</a>
      <a href="#" class="btn secondary">Open Web</a>
    </div>
  </div>
</div>

<section id="about">
  <h2>About</h2>

  <div class="features">
    <div class="card">⚡ Lightning fast</div>
    <div class="card">🔒 Private & secure</div>
    <div class="card">🎨 Premium UI</div>
  </div>
</section>

<section id="download">
  <h2>Download</h2>
  <a href="#" class="btn primary">Download APK</a>
</section>

<script>
/* SCROLL */
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add("visible");
    }
  });
});

/* PARALLAX */
const hero = document.getElementById("hero");

document.addEventListener("mousemove", (e) => {
  let x = (window.innerWidth / 2 - e.clientX) / 25;
  let y = (window.innerHeight / 2 - e.clientY) / 25;

  hero.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});
</script>

</body>
</html>
